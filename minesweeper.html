<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper Pro (Solver Compatible)</title>
    <style>
        @font-face {
            font-family: 'Digital';
            src: url('https://fonts.cdnfonts.com/s/14873/digital-7.woff') format('woff');
        }

        body {
            background-color: #c0c0c0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Tahoma', sans-serif;
            user-select: none;
        }

        .main-container {
            display: flex;
            gap: 15px;
            align-items: flex-start;
            justify-content: center;
            width: 100%;
        }

        .side-spacer {
            width: 218px;
            flex-shrink: 0;
            visibility: hidden;
        }

        .game-outer-frame {
            border: 3px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            padding: 6px;
            background-color: #c0c0c0;
            flex-shrink: 0;
        }

        .inset-frame {
            border: 3px solid;
            border-color: #808080 #ffffff #ffffff #808080;
            background-color: #c0c0c0;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 7px;
            margin-bottom: 6px;
        }

        .lcd-container {
            background-color: #000;
            position: relative;
            padding: 2px 5px;
            border: 2px solid;
            border-color: #808080 #ffffff #ffffff #808080;
            display: inline-block;
        }

        .lcd-bg {
            color: #330000;
            font-family: 'Digital';
            font-size: 38px;
            line-height: 1;
            position: absolute;
            z-index: 1;
        }

        .digit-display {
            color: #ff0000;
            font-family: 'Digital';
            font-size: 38px;
            width: 70px;
            text-align: right;
            line-height: 1;
            position: relative;
            z-index: 2;
        }

        #smiley {
            width: 32px;
            height: 32px;
            border: 3px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background-color: #c0c0c0;
        }
        #smiley:active {
            border-color: #808080 #ffffff #ffffff #808080;
            padding: 1px 0 0 1px;
        }
        #smiley svg { width: 24px; height: 24px; pointer-events: none; }

        #board {
            display: grid;
            border: 3px solid;
            border-color: #808080 #ffffff #ffffff #808080;
        }

        .cell {
            width: 24px;
            height: 24px;
            border: 3px solid;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 900;
        }

        .hd_closed { border-color: #ffffff #808080 #808080 #ffffff; }
        .hd_opened { border: 1px solid #808080; background-color: #c0c0c0; }

        .hd_type1 { color: #0000ff; } .hd_type2 { color: #008000; } .hd_type3 { color: #ff0000; }
        .hd_type4 { color: #000080; } .hd_type5 { color: #800000; } .hd_type6 { color: #008080; }
        .hd_type7 { color: #000000; } .hd_type8 { color: #808080; }

        .mine-hit { background-color: #ff0000 !important; }

        #stats-panel-frame { width: 200px; visibility: hidden; }
        .stats-panel { width: 100%; padding: 10px; box-sizing: border-box; display: flex; flex-direction: column; gap: 12px; }
        .stat-box { display: flex; flex-direction: column; gap: 2px; }
        .stat-label { font-size: 11px; font-weight: bold; color: #444; text-transform: uppercase; }
        .stat-value {
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            font-weight: bold;
            background: #ffffff;
            border: 1px solid #808080;
            padding: 4px 6px;
            text-align: right;
        }

        .menu { position: absolute; top: 10px; left: 10px; display: flex; gap: 5px; }
        .menu button { border: 2px solid; border-color: #ffffff #808080 #808080 #ffffff; background: #c0c0c0; padding: 2px 10px; cursor: pointer; font-size: 14px; }
        #result-banner { margin-bottom: 10px; font-size: 28px; font-weight: 900; text-align: center; height: 35px; }
    </style>
</head>
<body>

    <div class="menu">
        <button onclick="initGame('beginner')">Beginner</button>
        <button onclick="initGame('intermediate')">Intermediate</button>
        <button onclick="initGame('expert')">Expert</button>
    </div>

    <div id="result-banner"></div>

    <div class="main-container">
        <div id="left-spacer" class="side-spacer"></div>

        <div class="game-outer-frame">
            <div class="inset-frame stats-bar">
                <div class="lcd-container">
                    <div class="lcd-bg">888</div>
                    <div id="mine-count" class="digit-display">010</div>
                </div>
                <div id="smiley"></div>
                <div class="lcd-container">
                    <div class="lcd-bg">888</div>
                    <div id="timer" class="digit-display">000</div>
                </div>
            </div>
            <div id="board"></div>
        </div>

        <div id="stats-panel-frame" class="game-outer-frame">
            <div class="inset-frame stats-panel">
                <div style="font-weight: bold; text-align: center; border-bottom: 1px solid #808080; padding-bottom: 5px; margin-bottom: 5px;">GAME STATISTICS</div>
                <div class="stat-box"><span class="stat-label">Final Time</span><span id="stat-time" class="stat-value">0.000s</span></div>
                <div class="stat-box"><span class="stat-label">Estimated Time</span><span id="stat-est" class="stat-value">0.000s</span></div>
                <div class="stat-box"><span class="stat-label">3BV Solved / Total</span><span id="stat-3bv" class="stat-value">0 / 0</span></div>
                <div class="stat-box"><span class="stat-label">3BV / s (Speed)</span><span id="stat-3bvs" class="stat-value">0.000</span></div>
                <div class="stat-box"><span class="stat-label">Total Clicks</span><span id="stat-clicks" class="stat-value">0</span></div>
                <div class="stat-box"><span class="stat-label">Efficiency (IOE)</span><span id="stat-eff" class="stat-value">0.000%</span></div>
            </div>
        </div>
    </div>

    <script>
        const ICONS = {
            smile: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#ffff00" stroke="#000"/><circle cx="9" cy="9" r="1.5"/><circle cx="15" cy="9" r="1.5"/><path d="M7 15c1 2 3 3 5 3s4-1 5-3" fill="none" stroke="#000" stroke-width="1.5"/></svg>`,
            worried: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#ffff00" stroke="#000"/><circle cx="9" cy="9" r="1.5"/><circle cx="15" cy="9" r="1.5"/><circle cx="12" cy="16" r="2.5" fill="none" stroke="#000" stroke-width="1.5"/></svg>`,
            dead: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#ffff00" stroke="#000"/><path d="M7 7l4 4M11 7l-4 4M13 7l4 4M17 7l-4 4" stroke="#000" stroke-width="1.5"/><path d="M8 17s2-2 4-2 4 2 4 2" fill="none" stroke="#000" stroke-width="1.5"/></svg>`,
            cool: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#ffff00" stroke="#000"/><path d="M5 9h14v2H5zM6 11l2 3h8l2-3"/><path d="M8 16c1 1 2 2 4 2s3-1 4-2" fill="none" stroke="#000" stroke-width="1.5"/></svg>`,
            mine: `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="6"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4M5 5l3 3M16 16l3 3M5 19l3-3M16 8l3-3" stroke="#000" stroke-width="2"/><circle cx="10" cy="10" r="1.5" fill="#fff" fill-opacity="0.5"/></svg>`,
            flag: `<svg viewBox="0 0 24 24"><path d="M6 20h12M12 20V4M12 4L6 8l6 4" fill="#ff0000" stroke="#000" stroke-width="1.5"/></svg>`,
            wrong: `<svg viewBox="0 0 24 24"><path d="M6 20h12M12 20V4M12 4L6 8l6 4" fill="#ff0000" stroke="#000" stroke-width="1.5"/><path d="M4 4l16 16M20 4L4 20" stroke="#ff0000" stroke-width="2"/></svg>`
        };

        const CONFIG = {
            beginner: { rows: 9, cols: 9, mines: 10 },
            intermediate: { rows: 16, cols: 16, mines: 40 },
            expert: { rows: 16, cols: 30, mines: 99 }
        };

        let currentDifficulty = 'beginner';
        let board = [], revealedCount = 0, flaggedCount = 0, isGameOver = false, isFirstClick = true;
        let timerRequest = null, startTime = 0, total3BV = 0, clicks = 0;

        function setSmiley(type) { document.getElementById('smiley').innerHTML = ICONS[type]; }

        function initGame(difficulty) {
            if (difficulty) currentDifficulty = difficulty;
            const { rows, cols, mines } = CONFIG[currentDifficulty];
            
            // Critical: Reset all state
            cancelAnimationFrame(timerRequest);
            timerRequest = null;
            startTime = 0; clicks = 0; total3BV = 0;
            isGameOver = false; isFirstClick = true;
            revealedCount = 0; flaggedCount = 0;
            
            document.getElementById('result-banner').textContent = '';
            document.getElementById('stats-panel-frame').style.visibility = 'hidden';
            document.getElementById('left-spacer').style.visibility = 'hidden';
            document.getElementById('timer').textContent = '000';
            updateUI();
            setSmiley('smile');

            const boardEl = document.getElementById('board');
            boardEl.style.gridTemplateColumns = `repeat(${cols}, 24px)`;
            boardEl.innerHTML = '';
            board = [];

            for (let r = 0; r < rows; r++) {
                board[r] = [];
                for (let c = 0; c < cols; c++) {
                    const cellEl = document.createElement('div');
                    cellEl.classList.add('cell', 'hd_closed');
                    cellEl.dataset.y = r; cellEl.dataset.x = c;
                    cellEl.id = `cell_${c}_${r}`;
                    
                    cellEl.addEventListener('mousedown', (e) => {
                        if (isGameOver || board[r][c].isRevealed || board[r][c].isFlagged) return;
                        if (e.button === 0) setSmiley('worried');
                    });

                    cellEl.addEventListener('click', () => {
                        if (isGameOver) return;
                        if (board[r][c].isRevealed) handleChording(r, c);
                        else handleReveal(r, c);
                    });

                    cellEl.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        handleFlag(r, c);
                    });

                    boardEl.appendChild(cellEl);
                    board[r][c] = { isMine: false, isRevealed: false, isFlagged: false, neighborCount: 0, el: cellEl };
                }
            }
        }

        function calculate3BV() {
            const { rows, cols } = CONFIG[currentDifficulty];
            let count = 0;
            const visited = Array.from({ length: rows }, () => Array(cols).fill(false));
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (!board[r][c].isMine && board[r][c].neighborCount === 0 && !visited[r][c]) {
                        count++; floodFill3BV(r, c, visited);
                    }
                }
            }
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (!board[r][c].isMine && !visited[r][c]) count++;
                }
            }
            return count;
        }

        function floodFill3BV(r, c, visited) {
            if (visited[r][c]) return;
            visited[r][c] = true;
            if (board[r][c].neighborCount > 0) return;
            getNeighbors(r, c).forEach(n => floodFill3BV(parseInt(n.el.dataset.y), parseInt(n.el.dataset.x), visited));
        }

        function generateMines(excludeR, excludeC) {
            const { rows, cols, mines } = CONFIG[currentDifficulty];
            let placed = 0;
            while (placed < mines) {
                const r = Math.floor(Math.random() * rows), c = Math.floor(Math.random() * cols);
                const isNearFirst = Math.abs(r - excludeR) <= 1 && Math.abs(c - excludeC) <= 1;
                if (!board[r][c].isMine && !isNearFirst) { board[r][c].isMine = true; placed++; }
            }
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (!board[r][c].isMine) board[r][c].neighborCount = getNeighbors(r, c).filter(n => n.isMine).length;
                }
            }
            total3BV = calculate3BV();
        }

        function getNeighbors(r, c) {
            const neighbors = [];
            const { rows, cols } = CONFIG[currentDifficulty];
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    if (dr === 0 && dc === 0) continue;
                    const nr = r + dr, nc = c + dc;
                    if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) neighbors.push(board[nr][nc]);
                }
            }
            return neighbors;
        }

        function handleReveal(r, c) {
            if (isGameOver || board[r][c].isFlagged || board[r][c].isRevealed) return;
            if (isFirstClick) { isFirstClick = false; generateMines(r, c); startTime = performance.now(); startTimer(); }
            clicks++;
            if (board[r][c].isMine) { board[r][c].el.classList.add('mine-hit'); gameOver(false); return; }
            revealCell(r, c);
            const { rows, cols, mines } = CONFIG[currentDifficulty];
            if (revealedCount === (rows * cols) - mines) gameOver(true);
        }

        function handleChording(r, c) {
            const cell = board[r][c];
            if (!cell.isRevealed || cell.neighborCount === 0) return;
            const neighbors = getNeighbors(r, c);
            if (neighbors.filter(n => n.isFlagged).length === cell.neighborCount) {
                let anyUnrevealed = false;
                neighbors.forEach(n => { if (!n.isRevealed && !n.isFlagged) anyUnrevealed = true; });
                if (anyUnrevealed) clicks++;
                neighbors.forEach(n => { if (!n.isRevealed && !n.isFlagged) handleReveal(parseInt(n.el.dataset.y), parseInt(n.el.dataset.x)); });
            }
        }

        function revealCell(r, c) {
            const cell = board[r][c];
            if (cell.isRevealed || cell.isFlagged) return;
            cell.isRevealed = true; revealedCount++;
            cell.el.classList.remove('hd_closed');
            cell.el.classList.add('hd_opened');
            if (cell.neighborCount > 0) {
                cell.el.textContent = cell.neighborCount;
                cell.el.classList.add(`hd_type${cell.neighborCount}`);
            } else {
                getNeighbors(r, c).forEach(n => revealCell(parseInt(n.el.dataset.y), parseInt(n.el.dataset.x)));
            }
        }

        function handleFlag(r, c) {
            if (isGameOver || board[r][c].isRevealed) return;
            const cell = board[r][c];
            cell.isFlagged = !cell.isFlagged;
            if (cell.isFlagged) { cell.el.classList.add('hd_flag'); cell.el.innerHTML = ICONS.flag; flaggedCount++; }
            else { cell.el.classList.remove('hd_flag'); cell.el.innerHTML = ''; flaggedCount--; }
            updateUI();
        }

        function startTimer() {
            if (isGameOver) return;
            const now = performance.now();
            const elapsed = (now - startTime) / 1000;
            document.getElementById('timer').textContent = Math.floor(elapsed).toString().padStart(3, '0');
            timerRequest = requestAnimationFrame(startTimer);
        }

        function calculateSolved3BV() {
            let solved = 0;
            const visited = Array.from({ length: board.length }, () => Array(board[0].length).fill(false));
            for (let r = 0; r < board.length; r++) {
                for (let c = 0; c < board[0].length; c++) {
                    if (board[r][c].isRevealed && board[r][c].neighborCount === 0 && !visited[r][c]) {
                        solved++; floodFill3BV(r, c, visited);
                    }
                }
            }
            for (let r = 0; r < board.length; r++) {
                for (let c = 0; c < board[0].length; c++) {
                    if (board[r][c].isRevealed && !visited[r][c]) solved++;
                }
            }
            return solved;
        }

        function updateUI() {
            const { mines } = CONFIG[currentDifficulty];
            document.getElementById('mine-count').textContent = Math.max(-99, mines - flaggedCount).toString().padStart(3, '0');
        }

        function gameOver(isWin) {
            isGameOver = true;
            cancelAnimationFrame(timerRequest);
            const finalTime = (performance.now() - startTime) / 1000;
            for (let r = 0; r < board.length; r++) {
                for (let c = 0; c < board[0].length; c++) {
                    const cell = board[r][c];
                    if (cell.isMine) {
                        if (!cell.isFlagged) { cell.el.classList.remove('hd_closed'); cell.el.classList.add('hd_opened'); cell.el.innerHTML = ICONS.mine; }
                    } else if (cell.isFlagged) cell.el.innerHTML = ICONS.wrong;
                }
            }
            setSmiley(isWin ? 'cool' : 'dead');
            const banner = document.getElementById('result-banner');
            banner.textContent = isWin ? "VICTORY!" : "GAME OVER";
            banner.style.color = isWin ? "#008000" : "#ff0000";
            showPostGameStats(finalTime, isWin);
        }

        function showPostGameStats(finalTime, isWin) {
            const solved3BV = calculateSolved3BV();
            document.getElementById('stat-time').textContent = finalTime.toFixed(3) + "s";
            const bvs = finalTime > 0 ? (solved3BV / finalTime).toFixed(3) : "0.000";
            document.getElementById('stat-3bvs').textContent = bvs;
            const est = bvs > 0 ? (total3BV / bvs).toFixed(3) : "0.000";
            document.getElementById('stat-est').textContent = isWin ? finalTime.toFixed(3) + "s" : est + "s";
            document.getElementById('stat-3bv').textContent = solved3BV + " / " + total3BV;
            document.getElementById('stat-clicks').textContent = clicks;
            const eff = clicks > 0 ? ((solved3BV / clicks) * 100).toFixed(3) : "0.000";
            document.getElementById('stat-eff').textContent = eff + "%";
            document.getElementById('stats-panel-frame').style.visibility = 'visible';
            document.getElementById('left-spacer').style.visibility = 'visible';
        }

        // Dedicated Smiley Listener
        const smileyBtn = document.getElementById('smiley');
        smileyBtn.addEventListener('click', () => {
            initGame();
        });

        window.addEventListener('mouseup', () => { if (!isGameOver) setSmiley('smile'); });
        initGame('expert');
    </script>
</body>
</html>
